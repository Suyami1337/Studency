<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Урок №3 — Как ты выйдешь на 100-150.000 ₽ на маркетинге</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Oswald:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#1c1c1c;
    color:#fff;
    font-family:'Inter','Helvetica Neue',Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }
  a{color:inherit;text-decoration:none;}
  img{display:block;max-width:100%;}

  /* ---------- HERO ---------- */
  .hero{
    padding:64px 20px 32px;
    text-align:center;
  }
  .badge{
    display:inline-block;
    background:#2bb88a;
    color:#0f3a2c;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:18px;
    letter-spacing:.04em;
    padding:8px 18px 7px;
    border-radius:999px;
    text-transform:uppercase;
  }
  .hero h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:44px;
    line-height:1.1;
    letter-spacing:.01em;
    text-transform:uppercase;
    margin:24px auto 0;
    max-width:900px;
  }
  .hero h1 .accent{color:#2bb88a;}

  /* ---------- VIDEO PLACEHOLDER ---------- */
  .video-wrap{
    max-width:760px;
    margin:36px auto 0;
    padding:0 20px;
  }
  .video-frame{
    /* Сюда позже вставляется iframe с Kinescope / Vimeo / YouTube.
       Пока — пустой плейсхолдер-квадратик, как в оригинале. */
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border:1px dashed #3a3a3a;
    border-radius:6px;
    overflow:hidden;
  }
  .video-frame iframe{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    border:0;
  }

  /* ---------- CTA BUTTON ---------- */
  .cta-wrap{
    text-align:center;
    padding:32px 20px 0;
  }
  .cta-btn{
    display:inline-block;
    background:#2bb88a;
    color:#fff;
    font-family:'Inter',sans-serif;
    font-weight:500;
    font-size:16px;
    letter-spacing:.01em;
    padding:18px 54px;
    border-radius:8px;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
    transition:transform .2s ease, box-shadow .2s ease, filter .2s ease;
  }
  .cta-btn:hover{
    transform:translateY(-2px);
    box-shadow:0 10px 22px rgba(43,184,138,.35);
    filter:brightness(1.05);
  }
  .cta-btn:active{transform:translateY(0);}

  /* ---------- IMAGE CARD (clickable image with hover) ---------- */
  .img-card{
    display:block;
    border-radius:12px;
    overflow:hidden;
    transform:translateY(0) scale(1);
    transition:transform .35s cubic-bezier(.2,.7,.2,1),
               box-shadow .35s ease,
               filter .35s ease;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
    cursor:pointer;
  }
  .img-card:hover{
    transform:translateY(-4px) scale(1.01);
    box-shadow:0 20px 36px rgba(0,0,0,.45),
               0 0 0 1px rgba(43,184,138,.2);
    filter:brightness(1.04);
  }
  .img-card:active{
    transform:translateY(-1px) scale(1.005);
    transition-duration:.12s;
  }
  .img-card img{
    width:100%;
    height:auto;
    border-radius:12px;
    transition:transform .6s cubic-bezier(.2,.7,.2,1);
  }
  .img-card:hover img{transform:scale(1.02);}

  /* ---------- STATIC IMAGE TILE (non-clickable) ---------- */
  .tile{
    display:block;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
  }
  .tile img{width:100%;height:auto;display:block;}

  /* ---------- BANNER (online) — кнопка по размеру картинки, без чёрного фона ---------- */
  .banner-wrap{
    max-width:920px;
    margin:48px auto 0;
    padding:0 20px;
    display:flex;
    justify-content:center;
  }
  .banner-wrap .img-card{
    display:block;
    width:auto;
    max-width:100%;
    border-radius:14px;
    box-shadow:none;
    background:transparent;
    padding:0 !important;
    margin:0;
    font-size:0;
    line-height:0;
    border:0;
    overflow:hidden;
  }
  .banner-wrap .img-card img{
    display:block;
    width:100%;
    max-width:880px;
    height:auto;
    border-radius:14px;
    margin:0;
    padding:0;
    border:0;
  }

  /* ---------- SECTION HEADING ---------- */
  .section-title{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:34px;
    text-align:center;
    text-transform:uppercase;
    letter-spacing:.02em;
    margin:72px 0 36px;
  }
  .section-title .accent{color:#2bb88a;}

  /* ---------- CARDS GRID (5 tiles) ---------- */
  .cards-grid{
    max-width:1100px;
    margin:0 auto;
    padding:0 20px;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:18px;
    justify-items:center;
  }
  .cards-grid .tile{width:100%;}
  .cards-grid .row2{
    grid-column:span 3;
    display:grid;
    grid-template-columns:repeat(2,minmax(0,1fr));
    gap:18px;
    max-width:calc(66.666% - 6px);
    margin:0 auto;
    width:100%;
  }
  .cards-grid .row2 .tile{width:100%;}

  /* ---------- REVIEWS SLIDER ---------- */
  .reviews-wrap{
    max-width:1100px;
    margin:0 auto;
    padding:0 20px;
  }
  .reviews-arrows{
    display:flex;
    justify-content:center;
    gap:12px;
    margin:0 0 28px;
  }
  .arrow-btn{
    width:44px;height:44px;
    border-radius:50%;
    border:0;
    background:#2bb88a;
    color:#0f3a2c;
    display:inline-flex;
    align-items:center;
    justify-content:center;
    cursor:pointer;
    transition:transform .2s ease, filter .2s ease, background .2s ease, opacity .2s ease;
  }
  .arrow-btn.ghost{
    background:transparent;
    border:1px solid #2bb88a;
    color:#2bb88a;
  }
  .arrow-btn:hover{filter:brightness(1.1); transform:translateY(-1px);}
  .arrow-btn[disabled]{opacity:.35;cursor:not-allowed;transform:none;}

  .reviews-viewport{
    overflow:hidden;
    position:relative;
  }
  .reviews-track{
    display:flex;
    gap:18px;
    transition:transform .45s cubic-bezier(.2,.7,.2,1);
    will-change:transform;
  }
  .review-slide{
    flex:0 0 calc((100% - 36px) / 3);
    min-width:0;
  }
  .review-slide .tile{width:100%;}
  @media (max-width:820px){
    .review-slide{flex:0 0 calc((100% - 18px) / 2);}
  }
  @media (max-width:540px){
    .review-slide{flex:0 0 100%;}
    .cards-grid{grid-template-columns:1fr;}
    .cards-grid .row2{grid-template-columns:1fr;max-width:100%;}
  }

  /* ---------- PAIR SECTION ---------- */
  .pair{
    max-width:920px;
    margin:56px auto 0;
    padding:0 20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
  }

  /* ---------- FINAL CTA SECTION ---------- */
  .final{
    max-width:1100px;
    margin:72px auto 0;
    padding:0 20px;
    display:grid;
    grid-template-columns:1.05fr .95fr;
    gap:24px;
    align-items:center;
  }
  .final-text h2{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:34px;
    line-height:1.15;
    letter-spacing:.01em;
    text-transform:uppercase;
    margin:0 0 18px;
  }
  .final-text h2 .accent{color:#2bb88a;}
  .final-text .lead{
    font-size:14px;
    color:#c9c9c9;
    margin:0 0 6px;
  }
  .final-text .see-link{
    display:inline-block;
    margin:0 0 22px;
    font-size:14px;
    color:#c9c9c9;
  }
  .final-text .see-link a{
    color:#2bb88a;
    text-decoration:underline;
    text-underline-offset:3px;
  }
  .final-laptop img{
    width:100%;
    height:auto;
  }
  .final-cta{margin-top:8px;}

  /* ---------- BOTTOM SPACE ---------- */
  .bottom-space{height:80px;}

  /* ---------- responsive ---------- */
  @media (max-width:760px){
    .hero h1{font-size:28px;}
    .badge{font-size:14px;}
    .section-title{font-size:26px;}
    .pair{grid-template-columns:1fr;}
    .final{grid-template-columns:1fr; text-align:center;}
    .final-text h2{font-size:26px;}
  }
</style>
</head>
<body>

  <!-- HERO -->
  <section class="hero">
    <div class="badge">УРОК №3</div>
    <h1>
      Как ты выйдешь на 100-150.000 ₽<br>
      на маркетинге — <span class="accent">честный путь с нуля</span>
    </h1>
  </section>

  <!-- VIDEO -->
  <div class="video-wrap">
    <div class="video-frame" id="video-frame">
      <!-- Сюда позже вставляется embed-код видео Kinescope / Vimeo / YouTube -->
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap">
    <a class="cta-btn" href="https://t.me/shilovgreg" target="_blank" rel="noopener">Попасть на разбор</a>
  </div>

  <!-- ONLINE BANNER (clickable) -->
  <div class="banner-wrap">
    <a class="img-card banner-link" href="https://zoom.us/" target="_blank" rel="noopener" aria-label="Разбор проходит онлайн в ZOOM">
      <img src="/templates/grisha-3/assets/online-banner.png" alt="Разбор проходит онлайн — 40-60 минут в ZOOM, в удобное тебе время">
    </a>
  </div>

  <!-- ЧТО ТЫ ПОЛУЧИШЬ? — 5 отдельных некликабельных карточек -->
  <h2 class="section-title">Что ты <span class="accent">получишь?</span></h2>

  <div class="cards-grid">
    <div class="tile"><img src="/templates/grisha-3/assets/card-1.png" alt="01 — Поможем выбрать одно из 4-х направлений"></div>
    <div class="tile"><img src="/templates/grisha-3/assets/card-2.png" alt="02 — Покажем, с кем работать"></div>
    <div class="tile"><img src="/templates/grisha-3/assets/card-3.png" alt="03 — Дадим план на 10-14 дней"></div>
    <div class="row2">
      <div class="tile"><img src="/templates/grisha-3/assets/card-4.png" alt="04 — Дадим разбор со стороны"></div>
      <div class="tile"><img src="/templates/grisha-3/assets/card-5.png" alt="05 — Погрузим во внутрянку маркетинга"></div>
    </div>
  </div>

  <!-- CTA -->
  <div class="cta-wrap" style="padding-top:48px">
    <a class="cta-btn" href="https://t.me/shilovgreg" target="_blank" rel="noopener">Попасть на разбор</a>
  </div>

  <div class="bottom-space"></div>

  <script>
    // --- видео: когда будет готов embed с Kinescope/Vimeo — вставь его сюда:
    // document.getElementById('video-frame').innerHTML =
    //   '<iframe src="https://kinescope.io/embed/XXXXXXX" allow="autoplay; fullscreen; picture-in-picture; encrypted-media;" frameborder="0" allowfullscreen></iframe>';
  </script>

</body>
</html>
