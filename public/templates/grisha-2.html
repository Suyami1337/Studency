<style>
  *,*::before,*::after{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:#1c1c1c;
    color:#fff;
    font-family:'Inter','Helvetica Neue',Arial,sans-serif;
    -webkit-font-smoothing:antialiased;
    min-height:100vh;
  }

  /* ---------- HERO ---------- */
  .hero{
    padding:64px 20px 32px;
    text-align:center;
  }
  .badge{
    display:inline-block;
    background:#2bb88a;
    color:#0f3a2c;
    font-family:'Oswald',sans-serif;
    font-weight:600;
    font-size:18px;
    letter-spacing:.04em;
    padding:8px 18px 7px;
    border-radius:999px;
    text-transform:uppercase;
  }
  .hero h1{
    font-family:'Oswald',sans-serif;
    font-weight:700;
    font-size:44px;
    line-height:1.05;
    letter-spacing:.01em;
    text-transform:uppercase;
    margin:24px auto 0;
    max-width:900px;
  }
  .hero h1 .accent{
    color:#2bb88a;
    display:block;
    margin-top:6px;
  }

  /* ---------- VIDEO PLACEHOLDER ---------- */
  .video-wrap{
    max-width:760px;
    margin:36px auto 0;
    padding:0 20px;
  }
  .video-frame{
    /* Сюда позже вставляется iframe с Vimeo / Kinescope / YouTube.
       Пока — пустой плейсхолдер-квадратик. */
    position:relative;
    width:100%;
    aspect-ratio:16/9;
    background:#000;
    border:1px dashed #3a3a3a;
    border-radius:6px;
    overflow:hidden;
  }

  /* ---------- CARDS (as images) ---------- */
  .cards{
    max-width:920px;
    margin:36px auto 64px;
    padding:0 20px;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:18px;
  }
  .card-link{
    display:block;
    border-radius:12px;
    overflow:hidden;
    transform:translateY(0) scale(1);
    transition:transform .35s cubic-bezier(.2,.7,.2,1),
               box-shadow .35s ease,
               filter .35s ease;
    box-shadow:0 2px 6px rgba(0,0,0,.25);
    cursor:pointer;
  }
  .card-link:hover{
    transform:translateY(-6px) scale(1.02);
    box-shadow:0 22px 40px rgba(0,0,0,.45),
               0 0 0 1px rgba(43,184,138,.25);
    filter:brightness(1.04);
  }
  .card-link:active{
    transform:translateY(-2px) scale(1.005);
    transition-duration:.12s;
  }
  .card-img{
    display:block;
    width:100%;
    height:auto;
    border-radius:12px;
    transition:transform .6s cubic-bezier(.2,.7,.2,1);
  }
  .card-link:hover .card-img{
    transform:scale(1.03);
  }

  /* ---------- responsive ---------- */
  @media (max-width:760px){
    .hero h1{font-size:28px;}
    .badge{font-size:14px;}
    .cards{grid-template-columns:1fr;}
  }
</style>
</head>
<body>

  <section class="hero">
    <div class="badge">УРОК №2</div>
    <h1>
