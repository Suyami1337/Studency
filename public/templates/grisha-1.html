<style>
  :root{
    --bg:#0d0d0d;
    --card:#1c1c1c;
    --card-2:#222222;
    --accent:#2DB88F;        /* бирюзовый */
    --accent-2:#20a77f;      /* ховер */
    --play:#5B6CFF;          /* синий/фиолетовый play */
    --play-2:#4a5af0;
    --text:#ffffff;
    --muted:#bdbdbd;
    --radius:18px;
  }
  *{box-sizing:border-box}
  html,body{margin:0;padding:0;background:var(--bg);color:var(--text);font-family:'Montserrat',system-ui,sans-serif;-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  img{display:block;max-width:100%}

  .page{
    max-width:1000px;
    margin:0 auto;
    padding:28px 20px 60px;
  }

  /* бейдж "УРОК №1" */
  .badge-wrap{display:flex;justify-content:center;margin-bottom:18px}
  .badge{
    background:var(--accent);
    color:#071a14;
    font-weight:800;
    font-size:13px;
    letter-spacing:.5px;
    padding:7px 14px;
    border-radius:8px;
    text-transform:uppercase;
  }

  /* заголовок */
  .hero{
    text-align:center;
    font-weight:800;
    line-height:1.18;
    font-size:clamp(22px,3.2vw,32px);
    letter-spacing:.2px;
    text-transform:uppercase;
    margin:0 0 26px;
  }
  .hero .accent{color:var(--accent)}

  /* видео */
  .video{
    position:relative;
    width:min(640px,100%);
    margin:0 auto 40px;
    aspect-ratio: 640 / 360;
    border-radius:var(--radius);
    overflow:hidden;
    background:#000;
    box-shadow:0 10px 30px rgba(0,0,0,.35);
  }
  .video img{width:100%;height:100%;object-fit:cover}
  .video .overlay{
    position:absolute;inset:0;
    background:linear-gradient(180deg, rgba(0,0,0,.15), rgba(0,0,0,.45));
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
  }
  .video .sound{
    position:absolute;top:10px;right:10px;
    width:30px;height:30px;border-radius:6px;
    background:rgba(0,0,0,.55);
    display:flex;align-items:center;justify-content:center;
  }
  .video .play{
    width:80px;height:80px;border-radius:50%;
    background:var(--play);
    display:flex;align-items:center;justify-content:center;
    box-shadow:0 8px 20px rgba(91,108,255,.45);
    transition:transform .15s ease, background .15s ease;
  }
  .video .overlay:hover .play{transform:scale(1.05);background:var(--play-2)}
  .video .play svg{margin-left:5px}
  .video .caption{
    position:absolute;left:0;right:0;top:50%;transform:translateY(-50%);
    text-align:center;color:#fff;font-weight:700;
    font-size:clamp(13px,1.6vw,16px);
    line-height:1.4;
    padding:0 20px;
    pointer-events:none;
    text-shadow:0 2px 6px rgba(0,0,0,.6);
  }
  .video .caption .eyebrow{color:var(--play);font-size:.9em;margin-bottom:4px;font-weight:600}
  .video .caption .sub{font-weight:500;opacity:.9;margin-top:4px;font-size:.85em}

  /* плашки-кнопки (цельные картинки со скрина) — размер кнопки ровно по картинке */
  .card-img{
    display:block;
    margin:0 auto 16px;
    width:100%;
    transition:transform .18s ease, filter .18s ease;
    cursor:pointer;
    line-height:0;
    font-size:0;
  }
  .card-img img{width:100%;height:auto;display:block}
  .card-img:hover{transform:translateY(-2px);filter:brightness(1.05)}
  .card-img:active{transform:translateY(0);filter:brightness(.98)}
</style>
</head>
<body>
  <main class="page">

    <div class="badge-wrap">

    <h1 class="hero">

      <span class="accent">100-150.000 рублей</span> в месяц<br>
      <span class="accent">в онлайн</span> через 2-2,5 месяца
    </h1>

    <!-- Видео-плашка (заглушка, позже подставим плеер) -->
    <div class="video" id="video">
      <img src="/templates/grisha-1/assets/3e3c558b-f789-4f79-8ca7-45a4e96d4bd9.png" alt="Превью видео">
      <div class="overlay" role="button" aria-label="Воспроизвести видео" tabindex="0">
        <div class="sound" aria-hidden="true">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none">
            <path d="M11 5 6 9H3v6h3l5 4V5z" fill="#fff"></path>
            <path d="M16 9a5 5 0 0 1 0 6" stroke="#fff" stroke-width="1.8" stroke-linecap="round"></path>

          <svg width="26" height="30" viewBox="0 0 22 26" fill="none">

          </svg>
        </div>
      </div>
    </div>

    <!-- Зелёная плашка — цельная картинка со скрина, как кликабельная кнопка -->
    <a class="card-img" href="https://t.me/shamseeq" target="_blank" rel="noopener" aria-label="2-ой урок в боте">
      <img src="/templates/grisha-1/assets/56fbac10-e94c-4491-8943-d98aef951de3.png" alt="2-ой урок с разбором 4х направлений в маркетинге ждёт тебя в боте">

    <a class="card-img" href="https://t.me/shamseeq" target="_blank" rel="noopener" aria-label="Написать">

    </a>

  </main>
